name: mimi
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version — pinned for Wav2Lip compatibility
  - python=3.9.18

  # System utilities
  - ffmpeg=4.4.2        # required by Whisper and pydub
  - cmake=3.26.4
  - git

  # CUDA toolkit (must match your GPU driver)
  - cudatoolkit=11.3

  # PyTorch ecosystem — Wav2Lip requires this range
  - pytorch=1.12.1
  - torchvision=0.13.1
  - torchaudio=0.12.1

  # Scientific stack — pinned for Wav2Lip's np.bool usage
  - numpy=1.23.5
  - scipy=1.10.1

  # Audio
  - librosa=0.8.1
  - soundfile=0.10.3

  # OpenCV (prefer conda build for fewer conflicts)
  - opencv=4.5.5

  # pip-only installs
  - pip:
    - python-dotenv==1.0.0
    - openai-whisper==20231117
    - transformers==4.35.2
    - sentencepiece==0.1.99
    - sacremoses==0.0.53
    - indic-nlp-library==0.91
    - mosestokenizer==1.2.1
    - TTS==0.22.0
    - face-alignment==1.3.5
    - audioread==2.1.9
    - pydub==0.25.1
    - ffmpeg-python==0.2.0
    - pyworld==0.3.4
    - resemblyzer==0.1.3
    - jiwer==3.0.3
    - sacrebleu==2.3.1
    - gradio==4.19.2
    - pytest==7.4.4
    - pytest-timeout==2.2.0
    - tqdm==4.66.1
    - requests==2.31.0
    - Pillow==9.5.0
    # IndicTrans2 from source — run after env creation:
    # git clone https://github.com/AI4Bharat/IndicTrans2
    # pip install -e IndicTrans2/
    # Wav2Lip from source — run after env creation:
    # git clone https://github.com/Rudrabha/Wav2Lip
    # pip install -r Wav2Lip/requirements.txt (selectively, not blindly)
