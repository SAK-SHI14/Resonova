# ============================================================
# Mimi — Docker Compose
# ============================================================
# Usage:
#   docker compose up           # start (builds if image doesn't exist)
#   docker compose up --build   # force rebuild
#   docker compose down         # stop and remove containers
#
# ⚠️  GPU REQUIREMENT:
#   Requires NVIDIA GPU + nvidia-container-toolkit installed on the host.
#   Install nvidia-container-toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
#   On machines WITHOUT a CUDA GPU (e.g., the developer's Intel Arc laptop):
#   - The container will start and the Gradio UI will load at localhost:7860
#   - Model inference (Whisper/IndicTrans2/XTTS-v2/Wav2Lip) will fail with CUDA errors
#   - This is expected — see ADR-000 for the compute strategy
#   - To test the UI stub without GPU: comment out the 'deploy' section below
#
# WAV2LIP CHECKPOINT:
#   Download wav2lip_gan.pth (~400 MB) from:
#   https://github.com/Rudrabha/Wav2Lip/releases
#   Place it at: ./wav2lip_checkpoints/wav2lip_gan.pth
#   Then uncomment the volume mount below.
# ============================================================

version: "3.9"

services:
  mimi:
    build:
      context: .
      dockerfile: Dockerfile
    image: mimi:latest
    container_name: mimi_app

    # ─── Port mapping ────────────────────────────────────────────────────────
    ports:
      - "7860:7860"

    # ─── Environment variables ───────────────────────────────────────────────
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - WAV2LIP_REPO_PATH=/app/Wav2Lip
      - WAV2LIP_CHECKPOINT_PATH=/app/Wav2Lip/checkpoints/wav2lip_gan.pth
      - HF_HOME=/app/.cache/huggingface
      # Optional: set LOG_LEVEL=DEBUG for verbose pipeline logging
      - LOG_LEVEL=INFO

    # ─── Volume mounts ───────────────────────────────────────────────────────
    volumes:
      # Wav2Lip checkpoint (download separately — not bundled in image)
      # Uncomment after downloading wav2lip_gan.pth:
      # - ./wav2lip_checkpoints:/app/Wav2Lip/checkpoints:ro
      #
      # HuggingFace model cache (persist downloaded models across restarts)
      - hf_cache:/app/.cache/huggingface
      #
      # Output files (dubbed videos, logs)
      - ./outputs:/app/outputs

    # ─── GPU resource allocation ─────────────────────────────────────────────
    # Requires: nvidia-container-toolkit on host
    # To run WITHOUT GPU (CPU only, very slow inference): comment out this section
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1            # Request 1 GPU
              capabilities: [gpu]

    # ─── Health check ────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      start_period: 90s   # Allow time for Gradio to start + models to load
      retries: 3

    # ─── Restart policy ──────────────────────────────────────────────────────
    restart: unless-stopped

# ─── Named volumes ─────────────────────────────────────────────────────────
volumes:
  hf_cache:
    driver: local
